<!doctype html>
<html lang="zh" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>意念ERP - 企业资源管理系统</title>
    <!-- 普通脚本（非module），在React加载前注册，捕获所有类型的错误 -->
    <script>
      (function() {
        function showError(msg) {
          document.addEventListener('DOMContentLoaded', function() {
            var root = document.getElementById('root');
            if (root && !root.hasChildNodes()) {
              root.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;background:#f8fafc;color:#1e293b;padding:2rem;text-align:center"><div style="font-size:3rem;margin-bottom:1rem">⚠️</div><h2 style="margin:0 0 0.5rem">意念ERP 启动失败</h2><pre style="color:#dc2626;background:#fef2f2;padding:1rem;border-radius:0.5rem;max-width:600px;overflow:auto;text-align:left;font-size:0.875rem;white-space:pre-wrap">' + msg + '</pre><button onclick="location.reload()" style="margin-top:1rem;background:#1d4ed8;color:#fff;border:none;padding:0.5rem 1.5rem;border-radius:0.5rem;cursor:pointer;font-size:1rem">刷新重试</button></div>';
            }
          });
        }

        // 捕获同步错误
        window.onerror = function(msg, src, line, col, err) {
          var info = (err && err.stack) ? err.stack : (msg + '\n' + src + ':' + line + ':' + col);
          showError(info);
          return false;
        };

        // 捕获 Promise 异常
        window.addEventListener('unhandledrejection', function(e) {
          var info = e.reason && e.reason.stack ? e.reason.stack : String(e.reason);
          showError('Promise 异常:\n' + info);
        });

        // 超时检测：3秒后若 #root 仍为空，说明 JS 静默失败
        window.addEventListener('load', function() {
          setTimeout(function() {
            var root = document.getElementById('root');
            if (root && !root.hasChildNodes()) {
              showError('应用未能在3秒内加载完成。\n\n可能原因：\n1. 浏览器不支持 ES Modules\n2. 网络问题导致资源加载失败\n3. JavaScript 执行被阻止\n\n请尝试：Ctrl+Shift+R 强制刷新');
              // 立即显示错误，不等 DOMContentLoaded
              var root2 = document.getElementById('root');
              if (root2 && !root2.hasChildNodes()) {
                root2.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;background:#f8fafc;color:#1e293b;padding:2rem;text-align:center"><div style="font-size:3rem;margin-bottom:1rem">⚠️</div><h2 style="margin:0 0 0.5rem">加载失败</h2><p style="color:#64748b">请按 Ctrl+Shift+R 强制刷新，或检查网络连接</p><button onclick="location.reload()" style="margin-top:1rem;background:#1d4ed8;color:#fff;border:none;padding:0.5rem 1.5rem;border-radius:0.5rem;cursor:pointer;font-size:1rem">强制刷新</button></div>';
              }
            }
          }, 3000);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
